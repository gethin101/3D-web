<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hyperspeed Intro</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      font-family: system-ui, sans-serif;
    }

    #three-container {
      position: fixed;
      inset: 0;
      z-index: 10;
      transition: opacity 0.8s ease;
    }

    #portfolio {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      background: #000;
      color: #fff;
      padding: 4rem 8vw;
    }
  </style>
</head>
<body>

  <div id="three-container"></div>

  <main id="portfolio">
    <h1>Gethin – Portfolio</h1>
    <p>Your site content goes here.</p>
  </main>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.161.0/build/three.module.js';

    let scene, camera, renderer;
    let streaks = [];
    const container = document.getElementById('three-container');

    const DURATION = 4000; // 4 seconds
    let start = performance.now();

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);

      camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 2000);
      camera.position.set(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(innerWidth, innerHeight);
      renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
      container.appendChild(renderer.domElement);

      createStreaks();

      addEventListener("resize", () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
      });
    }

    function createStreaks() {
      const geo = new THREE.BoxGeometry(0.05, 0.05, 3);
      const mat = new THREE.MeshBasicMaterial({ color: 0xffffff });

      const count = /iPad|iPhone|iPod/.test(navigator.userAgent) ? 250 : 500;

      for (let i = 0; i < count; i++) {
        const m = new THREE.Mesh(geo, mat);
        resetStreak(m, true);
        scene.add(m);
        streaks.push(m);
      }
    }

    function resetStreak(m, initial = false) {
      m.position.x = THREE.MathUtils.randFloatSpread(10);
      m.position.y = THREE.MathUtils.randFloatSpread(10);
      m.position.z = initial
        ? THREE.MathUtils.randFloat(-200, 0)
        : -200;
    }

    function animate(now) {
      requestAnimationFrame(animate);

      const t = Math.min((now - start) / DURATION, 1);

      // Aggressive left-right dodging
      const dodge = Math.sin(t * 40) * 2.5;
      const dodgeY = Math.cos(t * 33) * 1.5;

      camera.position.x = dodge;
      camera.position.y = dodgeY;

      // Camera banking
      camera.rotation.z = -dodge * 0.15;

      // Move streaks toward camera
      const speed = 20 + t * 80; // accelerates
      for (const s of streaks) {
        s.position.z += speed;
        if (s.position.z > 2) resetStreak(s);
      }

      renderer.render(scene, camera);

      if (t >= 1) fadeOut();
    }

    function fadeOut() {
      if (!container.dataset.done) {
        container.dataset.done = "1";
        container.style.opacity = "0";
        setTimeout(() => (container.style.display = "none"), 900);
      }
    }
  </script>
</body>
</html>
