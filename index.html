<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hyperspeed Intro</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      font-family: system-ui, sans-serif;
    }

    #three-container {
      position: fixed;
      inset: 0;
      z-index: 10;
      transition: opacity 1s ease;
    }

    #portfolio {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      background: radial-gradient(circle at 50% 30%, #0a0a1a, #000);
      color: #eee;
      padding: 4rem 8vw;
    }
  </style>
</head>
<body>

  <div id="three-container"></div>

  <main id="portfolio">
    <h1>Gethin – Portfolio</h1>
    <p>Your site content goes here.</p>
  </main>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.161.0/build/three.module.js';

    let scene, camera, renderer;
    let streaks = [];
    const container = document.getElementById('three-container');

    const DURATION = 4000; // 4 seconds
    let start = performance.now();

    init();
    animate();

    function init() {
      scene = new THREE.Scene();

      // Nebula-ish background
      const loader = new THREE.TextureLoader();
      loader.load(
        "https://images.unsplash.com/photo-1444703686981-a3abbc4d4fe3?auto=format&fit=crop&w=1600&q=80",
        tex => {
          tex.mapping = THREE.EquirectangularReflectionMapping;
          scene.background = tex;
        }
      );

      camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 2000);
      camera.position.set(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(innerWidth, innerHeight);
      renderer.setPixelRatio(devicePixelRatio);
      container.appendChild(renderer.domElement);

      createStreaks();

      addEventListener("resize", () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
      });
    }

    function createStreaks() {
      const geo = new THREE.BoxGeometry(0.1, 0.1, 4);
      const mat = new THREE.MeshBasicMaterial({ color: 0xffffff });

      for (let i = 0; i < 600; i++) {
        const m = new THREE.Mesh(geo, mat);

        resetStreak(m, true);
        scene.add(m);
        streaks.push(m);
      }
    }

    function resetStreak(m, initial = false) {
      m.position.x = THREE.MathUtils.randFloatSpread(20);
      m.position.y = THREE.MathUtils.randFloatSpread(20);
      m.position.z = initial
        ? THREE.MathUtils.randFloat(-200, 0)
        : -200;
    }

    function animate(now) {
      requestAnimationFrame(animate);

      const t = Math.min((now - start) / DURATION, 1);

      // Camera aggressive dodging
      const dodge = Math.sin(t * 20) * 2.5;
      const dodgeY = Math.cos(t * 17) * 1.5;

      camera.position.x = dodge;
      camera.position.y = dodgeY;

      // Camera banking
      camera.rotation.z = -dodge * 0.1;

      // Shake
      camera.position.x += Math.sin(now * 0.05) * 0.1;
      camera.position.y += Math.cos(now * 0.07) * 0.1;

      // Move streaks fast
      for (const s of streaks) {
        s.position.z += 6 + t * 40; // accelerates
        if (s.position.z > 5) resetStreak(s);
      }

      renderer.render(scene, camera);

      if (t >= 1) fadeOut();
    }

    function fadeOut() {
      if (!container.dataset.done) {
        container.dataset.done = "1";
        container.style.opacity = "0";
        setTimeout(() => (container.style.display = "none"), 1000);
      }
    }
  </script>
</body>
</html>
