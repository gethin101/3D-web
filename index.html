<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D Robot Viewer</title>
  <style>
    body { margin: 0; background: white; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>

<!-- Three.js r148 (last version that supports old loaders + OrbitControls) -->
<script src="https://unpkg.com/three@0.148.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.148.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://unpkg.com/three@0.148.0/examples/js/loaders/MTLLoader.js"></script>
<script src="https://unpkg.com/three@0.148.0/examples/js/loaders/OBJLoader.js"></script>

<script>
// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff); // white background

// Camera
const camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth / window.innerHeight,
  0.1,
  100
);
camera.position.set(0, 1, 8);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// Soft studio lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.8));

const key = new THREE.DirectionalLight(0xffffff, 0.6);
key.position.set(5, 5, 5);
scene.add(key);

const fill = new THREE.DirectionalLight(0xffffff, 0.4);
fill.position.set(-5, 2, 3);
scene.add(fill);

const back = new THREE.DirectionalLight(0xffffff, 0.3);
back.position.set(0, -3, -5);
scene.add(back);

// Controls
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.autoRotate = true;
controls.autoRotateSpeed = 1.0;

// Smooth zoom on load
let zoom = 0;

// Load OBJ + MTL
const mtlLoader = new THREE.MTLLoader();
mtlLoader.setPath("assets/");
mtlLoader.load("robot.mtl", (materials) => {
  materials.preload();

  const objLoader = new THREE.OBJLoader();
  objLoader.setMaterials(materials);
  objLoader.setPath("assets/");
  objLoader.load("robot.obj", (object) => {
    object.scale.set(1, 1, 1);
    object.position.set(0, 0, 0);
    scene.add(object);
  });
});

// Resize
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
function animate() {
  requestAnimationFrame(animate);

  // Smooth zoom-in
  if (zoom < 1) {
    zoom += 0.01;
    camera.position.lerp(new THREE.Vector3(0, 1, 4), zoom);
  }

  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
